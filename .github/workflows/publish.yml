name: Publish @luutuankiet/mcp-proxy-shim

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write  # OIDC for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: wyvox/action-setup-pnpm@v3
        with:
          node-version: 22
          node-registry-url: 'https://registry.npmjs.org'

      - name: Build
        run: pnpm build

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: |
          # v1.0.7 -> 1.0.7  |  v1.0.7-dev.1 -> 1.0.7-dev.1
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Set package version from tag
        if: steps.version.outputs.version != ''
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          TAG="${GITHUB_REF_NAME:-manual}"
          if [[ "$TAG" =~ -dev\. ]]; then
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ -(rc|beta|alpha)\. ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish (with OIDC provenance)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
